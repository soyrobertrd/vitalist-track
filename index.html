<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HealthCRM" />
    <link rel="manifest" href="/manifest.json" />
    
    <title>HealthCRM - Sistema de Gestión de Pacientes</title>
    <meta name="description" content="Sistema CRM para la gestión integral de pacientes, llamadas de seguimiento y visitas médicas domiciliarias y ambulatorias." />
    <meta name="author" content="HealthCRM" />
    <meta name="keywords" content="CRM, salud, pacientes, llamadas, visitas, médico, enfermería, seguimiento" />

    <meta property="og:title" content="HealthCRM - Sistema de Gestión de Pacientes" />
    <meta property="og:description" content="Sistema CRM para la gestión integral de pacientes, llamadas de seguimiento y visitas médicas." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="HealthCRM" />
    <meta name="twitter:description" content="Sistema CRM para la gestión integral de pacientes" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
